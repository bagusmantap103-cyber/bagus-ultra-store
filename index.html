<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>cilxpp official store | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .product-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="pb-32">
    <!-- Navbar -->
    <nav class="sticky top-0 glass-effect z-50 px-6 py-4 flex justify-between items-center border-b border-gray-200">
        <h1 class="font-black text-xl md:text-2xl text-blue-600">cilxpp official store</h1>
        <div class="flex gap-4 items-center">
            <button onclick="toggleAdmin()" class="text-gray-500 hover:text-blue-600">
                <i class="fa fa-cog text-xl"></i>
            </button>
            <div class="relative cursor-pointer" onclick="openCart()">
                <i class="fa-solid fa-bag-shopping text-2xl"></i>
                <span id="cartBadge" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="px-6 mt-6 mb-8">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-3xl p-8 text-white">
            <h2 class="text-3xl font-bold mb-2">Selamat Datang di</h2>
            <p class="text-4xl font-black mb-4">cilxpp official store</p>
            <p class="opacity-90">Temukan produk terbaik kami di sini!</p>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div id="adminPanel" class="fixed inset-0 bg-black/50 z-[9999] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-6">
            <h3 class="text-2xl font-bold mb-4">Tambah Produk Baru</h3>
            <div class="space-y-4">
                <input type="text" id="productName" placeholder="Nama Produk" class="w-full p-3 border rounded-xl">
                <input type="number" id="productPrice" placeholder="Harga (Rp)" class="w-full p-3 border rounded-xl">
                <input type="file" id="productImage" accept="image/*" class="w-full p-2">
                <div class="flex gap-3 mt-4">
                    <button onclick="toggleAdmin()" class="flex-1 bg-gray-200 py-3 rounded-xl font-semibold">Batal</button>
                    <button onclick="saveProduct()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-semibold">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="fixed inset-0 bg-black/50 z-[9998] hidden items-end">
        <div class="bg-white w-full rounded-t-3xl p-6 max-h-[80vh] overflow-y-auto">
            <h2 class="text-2xl font-bold mb-4">Keranjang Belanja</h2>
            <div id="cartItems" class="space-y-3 mb-4"></div>
            <div class="border-t pt-4 mb-4">
                <div class="flex justify-between font-bold text-lg">
                    <span>Total:</span>
                    <span id="cartTotal" class="text-blue-600">Rp 0</span>
                </div>
            </div>
            <button onclick="checkout()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg">
                Checkout via WhatsApp
            </button>
        </div>
    </div>

    <!-- Product Catalog -->
    <div class="px-6" id="productCatalog"></div>

    <script>
        // Initialize data
        let products = JSON.parse(localStorage.getItem('bagus_products')) || [];
        let cart = [];

        // Toggle admin panel
        function toggleAdmin() {
            const modal = document.getElementById('adminPanel');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        // Save new product
        function saveProduct() {
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            const file = document.getElementById('productImage').files[0];
            
            if(!name || !price) {
                alert('Nama dan harga harus diisi!');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const newProduct = {
                    id: Date.now(),
                    name: name,
                    price: parseInt(price),
                    image: e.target.result || 'https://via.placeholder.com/400'
                };
                
                products.push(newProduct);
                localStorage.setItem('bagus_products', JSON.stringify(products));
                renderProducts();
                toggleAdmin();
                
                // Clear form
                document.getElementById('productName').value = '';
                document.getElementById('productPrice').value = '';
                document.getElementById('productImage').value = '';
            };
            
            if(file) {
                reader.readAsDataURL(file);
            } else {
                reader.onload({ target: { result: 'https://via.placeholder.com/400' } });
            }
        }

        // Delete product
        function deleteProduct(id) {
            if(confirm('Hapus produk ini?')) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('bagus_products', JSON.stringify(products));
                renderProducts();
            }
        }

        // Add to cart
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if(product) {
                cart.push(product);
                updateCartBadge();
                showNotification('Produk ditambahkan ke keranjang!');
            }
        }

        // Update cart badge
        function updateCartBadge() {
            document.getElementById('cartBadge').innerText = cart.length;
        }

        // Open cart modal
        function openCart() {
            const modal = document.getElementById('cartModal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
            
            // Render cart items
            const cartContainer = document.getElementById('cartItems');
            let total = 0;
            
            if(cart.length === 0) {
                cartContainer.innerHTML = '<p class="text-gray-500 text-center py-4">Keranjang belanja kosong</p>';
                document.getElementById('cartTotal').innerText = 'Rp 0';
                return;
            }
            
            cartContainer.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="flex justify-between items-center border-b pb-2">
                        <div>
                            <p class="font-semibold">${item.name}</p>
                            <p class="text-sm text-gray-600">Rp ${item.price.toLocaleString()}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-500">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                `;
            }).join('');
            
            document.getElementById('cartTotal').innerText = 'Rp ' + total.toLocaleString();
        }

        // Remove from cart
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartBadge();
            openCart(); // Refresh cart display
        }

        // Checkout via WhatsApp
        function checkout() {
            if(cart.length === 0) {
                alert('Keranjang belanja masih kosong!');
                return;
            }
            
            let message = `Halo *cilxpp official store*, saya ingin memesan:\n\n`;
            let total = 0;
            
            cart.forEach(item => {
                message += `- ${item.name}: Rp ${item.price.toLocaleString()}\n`;
                total += item.price;
            });
            
            message += `\n*Total: Rp ${total.toLocaleString()}*`;
            
            const waNumber = '082169483559';
            const waUrl = `https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`;
            window.open(waUrl, '_blank');
        }

        // Show notification
        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.className = 'fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-xl z-[10000]';
            notif.innerText = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }

        // Render products
        function renderProducts() {
            const container = document.getElementById('productCatalog');
            
            if(products.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fa fa-box-open text-6xl text-gray-300 mb-4"></i>
                        <p class="text-gray-500">Belum ada produk</p>
                        <p class="text-sm text-gray-400">Klik icon gear untuk menambah produk</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-2xl p-4 mb-4 relative group">
                    <img src="${p.image}" class="w-full h-48 object-cover rounded-xl mb-3">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg">${p.name}</h3>
                            <p class="text-blue-600 font-bold">Rp ${p.price.toLocaleString()}</p>
                        </div>
                        <button onclick="addToCart(${p.id})" class="bg-blue-600 text-white w-12 h-12 rounded-full hover:bg-blue-700 transition">
                            <i class="fa fa-plus"></i>
                        </button>
                    </div>
                    <button onclick="deleteProduct(${p.id})" class="absolute top-6 right-6 bg-red-500 text-white w-8 h-8 rounded-full opacity-0 group-hover:opacity-100 transition">
                        <i class="fa fa-trash text-sm"></i>
                    </button>
                </div>
            `).join('');
        }

        // Initial render
        renderProducts();
    </script>
</body>
</html>


    <!DOCTYPE html>
    <html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>cilxpp official store | Official Store</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
            body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; }
            .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px); }
            .product-card { transition: transform 0.3s ease; border: 1px solid #f0f0f0; }
            .product-card:hover { transform: translateY(-8px); }
            ::-webkit-scrollbar { display: none; }
        </style>
    </head>
    <body class="max-w-2xl mx-auto min-h-screen pb-32">

        <nav class="sticky top-0 glass z-[1000] px-8 py-7 flex justify-between items-center border-b border-gray-100">
            <h1 class="font-black text-2xl tracking-tighter italic text-blue-600">cilxpp official store</h1>
            <div class="flex gap-5 items-center">
                <button onclick="toggleAdmin()" class="text-gray-400 hover:text-black"><i class="fa fa-cog text-xl"></i></button>
                <div class="relative cursor-pointer" onclick="openCart()">
                    <i class="fa-solid fa-bag-shopping text-2xl"></i>
                    <span id="badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] rounded-full w-4 h-4 flex items-center justify-center font-bold">0</span>
                </div>
            </div>
        </nav>

        <div id="adminPanel" class="fixed inset-0 bg-black/60 z-[5000] hidden items-center justify-center p-6 backdrop-blur-sm">
            <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl">
                <h3 class="text-2xl font-black mb-6">Tambah Produk</h3>
                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="Nama Produk" class="w-full bg-gray-50 p-5 rounded-2xl border-none outline-none">
                    <input type="number" id="pPrice" placeholder="Harga (Rp)" class="w-full bg-gray-50 p-5 rounded-2xl border-none outline-none">
                    <input type="file" id="pImage" accept="image/*" class="text-sm text-gray-400 mt-2">
                    <div class="flex gap-3 mt-6">
                        <button onclick="toggleAdmin()" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">Batal</button>
                        <button onclick="saveProduct()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold">Simpan</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-8 mt-8 mb-12">
            <div class="bg-blue-600 rounded-[3rem] p-12 text-white relative overflow-hidden">
                <h2 class="text-4xl font-extrabold mb-2 leading-tight">Belanja <br> Lebih Lega.</h2>
                <p class="opacity-60 text-sm italic">Premium minimalis design.</p>
            </div>
        </div>

        <div class="px-8 space-y-10" id="katalog"></div>

        <div id="cartModal" class="fixed inset-0 bg-black/30 z-[3000] hidden items-end">
            <div class="bg-white w-full rounded-t-[4rem] p-12 shadow-2xl">
                <h2 class="text-3xl font-black mb-8">Keranjang</h2>
                <div id="cartItems" class="space-y-4 mb-8 max-h-60 overflow-y-auto"></div>
                <div class="flex justify-between items-center border-t pt-8 mb-8">
                    <span class="text-gray-400 font-bold">Total</span>
                    <span id="totalTxt" class="text-3xl font-black text-blue-600">Rp 0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-blue-600 text-white py-6 rounded-[2rem] font-black text-lg">Checkout WA</button>
            </div>
        </div>

        <script>
            let db = JSON.parse(localStorage.getItem('bagus_ultra_db')) || [];
            let cart = [];

            function toggleAdmin() {
                const el = document.getElementById('adminPanel');
                el.classList.toggle('hidden'); el.classList.toggle('flex');
            }

            function saveProduct() {
                const name = document.getElementById('pName').value;
                const price = document.getElementById('pPrice').value;
                const file = document.getElementById('pImage').files[0];
                if(!name || !price) return alert("Wajib isi!");
                const reader = new FileReader();
                reader.onload = (e) => {
                    db.push({ id: Date.now(), name, price: parseInt(price), img: e.target.result });
                    localStorage.setItem('bagus_ultra_db', JSON.stringify(db));
                    render(); toggleAdmin();
                };
                if(file) reader.readAsDataURL(file);
                else reader.onload({ target: { result: "https://via.placeholder.com/400" } });
            }

            function render() {
                const cont = document.getElementById('katalog');
                cont.innerHTML = db.map(p => `
                    <div class="product-card bg-white rounded-[3rem] p-7 group relative shadow-sm">
                        <img src="${p.img}" class="w-full h-80 object-cover rounded-[2.5rem] mb-6">
                        <div class="flex justify-between items-end">
                            <div>
                                <h3 class="text-xl font-bold mb-1">${p.name}</h3>
                                <p class="text-blue-600 font-black text-xl">Rp ${p.price.toLocaleString()}</p>
                            </div>
                            <button onclick="addToCart(${p.id})" class="w-16 h-16 bg-gray-900 text-white rounded-full text-2xl active:scale-90 transition"><i class="fa fa-plus"></i></button>
                        </div>
                        <button onclick="deleteProd(${p.id})" class="absolute top-10 right-10 bg-red-500 text-white w-10 h-10 rounded-full opacity-0 group-hover:opacity-100 transition shadow-lg"><i class="fa fa-trash"></i></button>
                    </div>
                `).join('');
            }

            function addToCart(id) {
                cart.push(db.find(p => p.id === id));
                document.getElementById('badge').innerText = cart.length;
            }

            function openCart() {
                document.getElementById('cartModal').classList.toggle('hidden');
                document.getElementById('cartModal').classList.toggle('flex');
                let total = 0;
                document.getElementById('cartItems').innerHTML = cart.map(i => {
                    total += i.price;
                    return `<div class="flex justify-between font-bold text-gray-700"><span>${i.name}</span><span>Rp ${i.price.toLocaleString()}</span></div>`;
                }).join('');
                document.getElementById('totalTxt').innerText = "Rp " + total.toLocaleString();
            }

            function checkout() {
                if(!cart.length) return alert("Kosong!");
                const msg = `Halo Admin cilxpp official store, saya mau order:\n` + cart.map(i => `- ${i.name}`).join('\n');
                window.open(`https://wa.me/082169483559?text=${encodeURIComponent(msg)}`);
            }

            function deleteProd(id) {
                if(confirm("Hapus produk?")) {
                    db = db.filter(p => p.id !== id);
                    localStorage.setItem('bagus_ultra_db', JSON.stringify(db));
                    render();
                }
            }
            render();
        </script>
    </body>
    </html>
